<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASA Build Blueprint Parser</title>
</head>
<body>
<h1>ASA Build Blueprint Structure Counter</h1>
<input type="file" id="buildFile" />
<button onclick="parseBuild()">Count Structures</button>
<pre id="output"></pre>

<script>
function parseBuild() {
  const input = document.getElementById('buildFile');
  const file = input.files[0];

  if (!file) {
    alert('Please select a build file.');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;

    try {
      const data = JSON.parse(text);
      countStructures(data);
    } catch (err) {
      document.getElementById('output').innerText = 'Error parsing JSON. Please check the file format.';
    }
  };
  reader.readAsText(file);
}

function countStructures(data) {
  const entries = data.entries;
  const counts = {};

  // Count each structure type
  entries.forEach(entry => {
    const structureType = entry.structure;
    counts[structureType] = (counts[structureType] || 0) + 1;
  });

  // Format output
  let outputStr = 'Structure Counts:\n';
  for (const [structure, count] of Object.entries(counts)) {
    outputStr += `${structure}: ${count}\n`;
  }

  document.getElementById('output').innerText = outputStr;
}
</script>
</body>
</html>
