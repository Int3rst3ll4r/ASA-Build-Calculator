<script>
// Load the structure mapping JSON
let structureMap = {};

fetch('structures.json')
  .then(response => response.json())
  .then(data => {
    structureMap = data;
  });

// Existing functions
function parseBuild() {
  const input = document.getElementById('buildFile');
  const file = input.files[0];

  if (!file) {
    alert('Please select a build file.');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;

    try {
      const data = JSON.parse(text);
      countStructures(data);
    } catch (err) {
      document.getElementById('output').innerText = 'Error parsing JSON. Please check the file format.';
    }
  };
  reader.readAsText(file);
}

function countStructures(data) {
  const entries = data.entries;
  const counts = {};

  // Count each structure type
  entries.forEach(entry => {
    const structureType = entry.structure;
    const shortName = structureMap[structureType] || structureType; // fallback to full if no mapping
    counts[shortName] = (counts[shortName] || 0) + 1;
  });

  // Format output
  let outputStr = 'Structure Counts:\n';
  for (const [structure, count] of Object.entries(counts)) {
    outputStr += `${structure}: ${count}\n`;
  }

  document.getElementById('output').innerText = outputStr;
}
</script>
